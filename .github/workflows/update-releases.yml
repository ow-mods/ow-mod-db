name: Update Releases

concurrency: update-releases

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - source
    paths:
      - "mods.json"
  pull_request:
    branches:
      - "source"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "26"

      - run: npm ci
        working-directory: scripts

      - name: Checkout database repo
        uses: actions/checkout@v4
        with:
          ref: master
          path: database

      - name: Make database copy
        run: cp database/database.json previous-database.json

      # We used to remove existing thumbnails to avoid accumulating them forever,
      # but sometimes that would mean deleting thumbnails for existing mods when something went wrong,
      # so we don't do that anymore.
      # - name: Remove existing thumbnails
      #   run: rm -rf database/thumbnails

      - name: Fetch mod releases and manifests
        run: node scripts/src/update-database/index.ts
        env:
          INPUT_OUT_DIRECTORY: database
          INPUT_MODS: mods.json
          INPUT_PREVIOUS_DATABASE: previous-database.json
          INPUT_CLOUDFLARE_API_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CLOUDFLARE_API_TOKEN || '' }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: database

      - name: Deploy to GitHub Pages
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/deploy-pages@v4
        with:
          token: ${{ env.GH_TOKEN }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        if: ${{ github.event_name != 'pull_request' }}
        with:
          branch: master
          repository: database
          commit_message: Update mod database
          commit_user_name: Outer Wilds Mod Database
          commit_user_email: database@outerwildsmods.com
          commit_author: Outer Wilds Mod Database <database@outerwildsmods.com>

      - name: Dispatch Website Build Event
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          curl -XPOST -u "${{ secrets.GH_USER }}:${{ env.GH_TOKEN }}" -H "Accept: application/vnd.github.everest-preview+json" -H "Content-Type: application/json" https://api.github.com/repos/ow-mods/outerwildsmods.com/dispatches --data '{"event_type": "build"}'

      - name: Send Notifications
        if: ${{ github.event_name != 'pull_request' }}
        run: node scripts/src/send-notifications/index.ts
        env:
          INPUT_PREVIOUS_DATABASE: previous-database.json
          INPUT_NEXT_DATABASE: database/database.json
          INPUT_DISCORD_MOD_HOOK_URLS: ${{ secrets.DISCORD_MOD_HOOK_URLS }}
          INPUT_DISCORD_HOOK_URL: ${{ secrets.DISCORD_HOOK_URL }}
          INPUT_DISCORD_MOD_UPDATE_ROLE_ID: ${{ secrets.DISCORD_MOD_UPDATE_ROLE_ID }}
          INPUT_DISCORD_NEW_MOD_ROLE_ID: ${{ secrets.DISCORD_NEW_MOD_ROLE_ID }}
